<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0e7490"/>
      <stop offset="55%" stop-color="#0a4a5e"/>
      <stop offset="100%" stop-color="#083344"/>
    </linearGradient>
    <linearGradient id="dieGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#eefbfd"/>
    </linearGradient>
    <linearGradient id="redGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#e03c3c"/>
      <stop offset="100%" stop-color="#cc0000"/>
    </linearGradient>
    <filter id="ds" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="6" stdDeviation="10" flood-color="#000" flood-opacity="0.30"/>
    </filter>
    <filter id="dsLite" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#000" flood-opacity="0.20"/>
    </filter>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- decorative dashed circles -->
  <g opacity="0.10">
    <circle cx="1010" cy="130" r="130" fill="none" stroke="#22d3ee" stroke-width="2" stroke-dasharray="4 8"/>
    <circle cx="1110" cy="520" r="160" fill="none" stroke="#22d3ee" stroke-width="2" stroke-dasharray="4 8"/>
    <circle cx="120" cy="560" r="140" fill="none" stroke="#22d3ee" stroke-width="2" stroke-dasharray="4 8"/>
  </g>

  <!-- LEFT -->
  <g transform="translate(60, 74)">
    <g>
      <rect width="260" height="28" rx="14" fill="#062733"/>
      <text x="130" y="19" text-anchor="middle"
            font-family="-apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif"
            font-weight="700" font-size="12" fill="#22d3ee" letter-spacing="2">TECH JOBS INTELLIGENCE</text>
    </g>

    <text y="96" font-family="-apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif"
          font-weight="900" font-size="58" fill="#ffffff">Dice.com</text>
    <text y="160" font-family="-apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif"
          font-weight="900" font-size="58" fill="#ffffff">Jobs Scraper</text>

    <text y="200" font-family="-apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif"
          font-weight="700" font-size="18" fill="#c9eef7">Salary · Skills · Remote · Sponsorship · Company profiles</text>
    <text y="224" font-family="-apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif"
          font-weight="500" font-size="14" fill="#8fc6d6">Full detail rows from any search URL or keyword filters. No browser.</text>

    <!-- feature chips -->
    <g transform="translate(0, 252)" filter="url(#dsLite)">
      <rect width="230" height="34" rx="17" fill="#ffffff"/>
      <circle cx="20" cy="17" r="5" fill="#cc0000"/>
      <text x="34" y="22" font-family="-apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif"
            font-weight="700" font-size="13" fill="#083344">Employer contact emails</text>
    </g>
    <g transform="translate(240, 252)" filter="url(#dsLite)">
      <rect width="238" height="34" rx="17" fill="#ffffff"/>
      <circle cx="20" cy="17" r="5" fill="#cc0000"/>
      <text x="34" y="22" font-family="-apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif"
            font-weight="700" font-size="13" fill="#083344">Payment-stack lead scoring</text>
    </g>
    <g transform="translate(0, 298)" filter="url(#dsLite)">
      <rect width="252" height="34" rx="17" fill="#ffffff"/>
      <circle cx="20" cy="17" r="5" fill="#cc0000"/>
      <text x="34" y="22" font-family="-apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif"
            font-weight="700" font-size="13" fill="#083344">Monitoring: only new postings</text>
    </g>
    <g transform="translate(262, 298)" filter="url(#dsLite)">
      <rect width="170" height="34" rx="17" fill="#ffffff"/>
      <circle cx="20" cy="17" r="5" fill="#cc0000"/>
      <text x="34" y="22" font-family="-apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif"
            font-weight="700" font-size="13" fill="#083344">JSON + CSV export</text>
    </g>

    <!-- URL chip -->
    <g transform="translate(0, 362)" filter="url(#dsLite)">
      <rect width="520" height="58" rx="12" fill="#041e28"/>
      <text x="22" y="36" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace"
            font-size="18" fill="#7ec699">▸ </text>
      <text x="46" y="36" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace"
            font-size="17" fill="#d8f2f8">dice.com/jobs?q=</text>
      <text x="212" y="36" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace"
            font-size="17" fill="#22d3ee" font-weight="700">software+engineer</text>
      <text x="392" y="36" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace"
            font-size="17" fill="#d8f2f8">&amp;remote…</text>
    </g>

    <text y="452" font-family="-apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif"
          font-weight="500" font-size="14" fill="#8fc6d6">Search URL or keyword + filters · Applicant counts when exposed · Free trial</text>
  </g>

  <!-- RIGHT — die motif -->
  <g filter="url(#ds)" transform="translate(940, 280) rotate(-10)">
    <rect x="-150" y="-150" width="300" height="300" rx="54" fill="url(#dieGrad)"/>
    <circle cx="-78" cy="-78" r="32" fill="url(#redGrad)"/>
    <circle cx="78"  cy="-78" r="32" fill="url(#redGrad)"/>
    <circle cx="0"   cy="0"   r="32" fill="url(#redGrad)"/>
    <circle cx="-78" cy="78"  r="32" fill="url(#redGrad)"/>
    <circle cx="78"  cy="78"  r="32" fill="url(#redGrad)"/>
  </g>

  <!-- small email tag under die -->
  <g filter="url(#dsLite)" transform="translate(830, 480)">
    <rect width="228" height="44" rx="22" fill="#062733" stroke="#22d3ee" stroke-width="1.5"/>
    <text x="24" y="28" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace"
          font-size="15" fill="#22d3ee">@</text>
    <text x="46" y="28" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace"
          font-size="14" fill="#d8f2f8">contactEmail: "hr@…"</text>
  </g>

  <text x="60" y="600" font-family="-apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif"
        font-weight="700" font-size="12" fill="#c9eef7" opacity="0.65" letter-spacing="2">APIFY ACTOR · MEMO23</text>
</svg>
