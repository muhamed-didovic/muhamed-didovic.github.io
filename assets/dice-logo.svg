<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0e7490"/>
      <stop offset="60%" stop-color="#0a4a5e"/>
      <stop offset="100%" stop-color="#083344"/>
    </linearGradient>
    <linearGradient id="dieGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#eefbfd"/>
    </linearGradient>
    <linearGradient id="redGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#e03c3c"/>
      <stop offset="100%" stop-color="#cc0000"/>
    </linearGradient>
    <filter id="dropShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="6" stdDeviation="10" flood-color="#000000" flood-opacity="0.35"/>
    </filter>
    <filter id="dsLite" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#000000" flood-opacity="0.25"/>
    </filter>
  </defs>

  <!-- Rounded card -->
  <rect width="512" height="512" rx="64" fill="url(#bgGrad)"/>

  <!-- decorative dashed circles -->
  <g opacity="0.10">
    <circle cx="430" cy="90" r="110" fill="none" stroke="#22d3ee" stroke-width="3" stroke-dasharray="5 9"/>
    <circle cx="70" cy="440" r="120" fill="none" stroke="#22d3ee" stroke-width="3" stroke-dasharray="5 9"/>
  </g>

  <!-- Die motif, slightly rotated -->
  <g filter="url(#dropShadow)" transform="translate(256, 232) rotate(-8)">
    <rect x="-118" y="-118" width="236" height="236" rx="44" fill="url(#dieGrad)"/>
    <!-- five pips -->
    <circle cx="-62" cy="-62" r="26" fill="url(#redGrad)"/>
    <circle cx="62"  cy="-62" r="26" fill="url(#redGrad)"/>
    <circle cx="0"   cy="0"   r="26" fill="url(#redGrad)"/>
    <circle cx="-62" cy="62"  r="26" fill="url(#redGrad)"/>
    <circle cx="62"  cy="62"  r="26" fill="url(#redGrad)"/>
  </g>

  <!-- bottom job-row strip -->
  <g filter="url(#dsLite)" transform="translate(76, 408)">
    <rect width="360" height="56" rx="28" fill="#062733"/>
    <circle cx="30" cy="28" r="10" fill="#22d3ee"/>
    <rect x="52" y="16" width="150" height="10" rx="5" fill="#9fdcea"/>
    <rect x="52" y="33" width="96" height="8" rx="4" fill="#3f7f93"/>
    <rect x="238" y="14" width="100" height="28" rx="14" fill="url(#redGrad)"/>
    <text x="288" y="33" text-anchor="middle"
          font-family="-apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif"
          font-weight="800" font-size="15" fill="#ffffff">JOBS</text>
  </g>
</svg>
