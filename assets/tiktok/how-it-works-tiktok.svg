<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 720" width="1200" height="720" font-family="-apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#14141C"/>
      <stop offset="100%" stop-color="#09090E"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#25F4EE"/>
      <stop offset="100%" stop-color="#FE2C55"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="720" fill="url(#bg)"/>
  <text x="600" y="92" text-anchor="middle" fill="#FFFFFF" font-size="44" font-weight="800">How it works</text>
  <text x="600" y="138" text-anchor="middle" fill="#9A9AAA" font-size="24" font-weight="500">Profile URL → every video → caption-first transcript (AI Whisper optional)</text>

  <!-- connector line -->
  <line x1="170" y1="400" x2="1030" y2="400" stroke="url(#accent)" stroke-width="4" opacity="0.5"/>

  <!-- Step 1 -->
  <g transform="translate(70,300)">
    <rect width="240" height="200" rx="28" fill="#15151E" stroke="#25F4EE" stroke-opacity="0.35" stroke-width="2"/>
    <circle cx="40" cy="44" r="22" fill="#25F4EE"/>
    <text x="40" y="52" text-anchor="middle" fill="#0A0A0F" font-size="24" font-weight="800">1</text>
    <text x="24" y="104" fill="#FFFFFF" font-size="25" font-weight="700">Paste profile</text>
    <text x="24" y="138" fill="#A7A7B5" font-size="19">tiktok.com/@creator</text>
    <text x="24" y="166" fill="#A7A7B5" font-size="19">one or many URLs</text>
  </g>

  <!-- Step 2 -->
  <g transform="translate(330,300)">
    <rect width="240" height="200" rx="28" fill="#15151E" stroke="#2A2A38" stroke-width="2"/>
    <circle cx="40" cy="44" r="22" fill="#F3F3F7"/>
    <text x="40" y="52" text-anchor="middle" fill="#0A0A0F" font-size="24" font-weight="800">2</text>
    <text x="24" y="104" fill="#FFFFFF" font-size="25" font-weight="700">Stealth find</text>
    <text x="24" y="138" fill="#A7A7B5" font-size="19">browser intercepts</text>
    <text x="24" y="166" fill="#A7A7B5" font-size="19">every video, no captcha</text>
  </g>

  <!-- Step 3 (highlight) -->
  <g transform="translate(590,290)">
    <rect width="240" height="220" rx="28" fill="#161620" stroke="#25F4EE" stroke-width="2.5"/>
    <circle cx="40" cy="44" r="22" fill="url(#accent)"/>
    <text x="40" y="52" text-anchor="middle" fill="#0A0A0F" font-size="24" font-weight="800">3</text>
    <text x="24" y="104" fill="#FFFFFF" font-size="25" font-weight="700">Caption-first</text>
    <text x="24" y="138" fill="#25F4EE" font-size="19" font-weight="600">TikTok's own caption</text>
    <text x="24" y="166" fill="#A7A7B5" font-size="19">free · instant · accurate</text>
    <rect x="24" y="184" width="150" height="12" rx="6" fill="#25F4EE" opacity="0.8"/>
  </g>

  <!-- Step 4 -->
  <g transform="translate(850,300)">
    <rect width="240" height="200" rx="28" fill="#15151E" stroke="#FE2C55" stroke-opacity="0.4" stroke-width="2"/>
    <circle cx="40" cy="44" r="22" fill="#FE2C55"/>
    <text x="40" y="52" text-anchor="middle" fill="#0A0A0F" font-size="24" font-weight="800">4</text>
    <text x="24" y="104" fill="#FFFFFF" font-size="25" font-weight="700">AI fallback</text>
    <text x="24" y="138" fill="#FE2C55" font-size="19" font-weight="600">opt-in Whisper</text>
    <text x="24" y="166" fill="#A7A7B5" font-size="19">no-caption / any lang</text>
  </g>

  <!-- output -->
  <text x="600" y="610" text-anchor="middle" fill="#FFFFFF" font-size="26" font-weight="700">→ one clean row per video: metadata · stats · transcript</text>
  <text x="600" y="650" text-anchor="middle" fill="#7E7E8E" font-size="20">JSON or CSV · you only pay for transcripts you get</text>
</svg>
