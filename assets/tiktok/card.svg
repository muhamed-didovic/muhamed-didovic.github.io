<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630" font-family="-apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#16161F"/>
      <stop offset="60%" stop-color="#0D0D13"/>
      <stop offset="100%" stop-color="#08080C"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#25F4EE"/>
      <stop offset="100%" stop-color="#FE2C55"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <!-- soft glow accents -->
  <circle cx="1060" cy="120" r="220" fill="#25F4EE" opacity="0.08"/>
  <circle cx="980" cy="560" r="200" fill="#FE2C55" opacity="0.08"/>

  <!-- Left: copy -->
  <g transform="translate(80,150)">
    <text x="0" y="0" fill="#25F4EE" font-size="24" font-weight="700" letter-spacing="3">TIKTOK · APIFY ACTOR</text>
    <text x="0" y="78" fill="#FFFFFF" font-size="68" font-weight="800">Bulk TikTok Video</text>
    <text x="0" y="150" fill="#FFFFFF" font-size="68" font-weight="800">Transcripts</text>
    <text x="0" y="208" fill="#B9B9C6" font-size="30" font-weight="500">Captions-first · optional AI Speech-to-Text</text>
    <!-- feature pills -->
    <g transform="translate(0,256)" font-size="22" font-weight="600">
      <rect x="0" y="0" width="240" height="48" rx="24" fill="#1C1C26" stroke="#25F4EE" stroke-opacity="0.4"/>
      <text x="24" y="31" fill="#E9E9F1">Whole profile → text</text>
      <rect x="258" y="0" width="170" height="48" rx="24" fill="#1C1C26" stroke="#FE2C55" stroke-opacity="0.4"/>
      <text x="282" y="31" fill="#E9E9F1">~$0.006 / video</text>
    </g>
  </g>

  <!-- Right: phone with caption lines -->
  <g transform="translate(815,150)">
    <rect x="0" y="0" width="300" height="330" rx="40" fill="#0E0E15" stroke="#2A2A38" stroke-width="2"/>
    <rect x="22" y="26" width="256" height="180" rx="20" fill="#181822"/>
    <path d="M132 96 L132 150 L182 123 Z" fill="url(#accent)"/>
    <!-- caption lines flowing out -->
    <rect x="34" y="232" width="232" height="18" rx="9" fill="#25F4EE"/>
    <rect x="34" y="262" width="196" height="18" rx="9" fill="#EDEDF3"/>
    <rect x="34" y="292" width="150" height="18" rx="9" fill="#FE2C55"/>
  </g>

  <!-- bottom accent bar -->
  <rect x="80" y="540" width="1040" height="6" rx="3" fill="url(#accent)" opacity="0.85"/>
</svg>
