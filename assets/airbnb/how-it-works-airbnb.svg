<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 720" width="1200" height="720">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FF5A5F"/>
      <stop offset="100%" stop-color="#ffb3b8"/>
    </linearGradient>
    <linearGradient id="card" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#fafafa"/>
    </linearGradient>
    <filter id="ds" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="3" stdDeviation="4" flood-color="#000" flood-opacity="0.18"/>
    </filter>
    <marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="9" markerHeight="9" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#222"/>
    </marker>
  </defs>

  <rect width="1200" height="720" fill="url(#bg)"/>

  <text x="600" y="62" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif"
        font-weight="800" font-size="34" fill="#1a1a1a">How the Airbnb Scraper works</text>
  <text x="600" y="96" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif"
        font-weight="500" font-size="17" fill="#4a0c1f">Listings · Prices · Reviews · Calendar · Revenue — one flat row per listing.</text>

  <!-- STEP 1 -->
  <g transform="translate(50, 160)" filter="url(#ds)">
    <rect width="320" height="430" rx="18" fill="url(#card)" stroke="#D81B60" stroke-width="2"/>
    <text x="20" y="36" font-family="-apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-weight="800" font-size="20" fill="#222">1 · Input</text>
    <text x="20" y="62" font-family="-apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-weight="500" font-size="13" fill="#666">A location name or any Airbnb URL</text>

    <g transform="translate(20, 86)">
      <rect width="280" height="38" rx="8" fill="#fff0f2" stroke="#D81B60"/>
      <text x="14" y="24" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="12" fill="#222">London   (location query)</text>
    </g>
    <g transform="translate(20, 134)">
      <rect width="280" height="38" rx="8" fill="#fff0f2" stroke="#D81B60"/>
      <text x="14" y="24" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="11" fill="#222">airbnb.com/s/Paris--France/homes</text>
    </g>
    <g transform="translate(20, 182)">
      <rect width="280" height="38" rx="8" fill="#fff0f2" stroke="#D81B60"/>
      <text x="14" y="24" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="12" fill="#222">airbnb.com/rooms/28198214</text>
    </g>
    <g transform="translate(20, 230)">
      <rect width="280" height="38" rx="8" fill="#fff0f2" stroke="#D81B60"/>
      <text x="14" y="24" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="12" fill="#222">airbnb.com/users/show/12345</text>
    </g>

    <text x="20" y="300" font-family="-apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-weight="700" font-size="14" fill="#222">Auto-classified</text>
    <text x="20" y="323" font-family="-apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="13" fill="#444">Location, search, room &amp; host</text>
    <text x="20" y="341" font-family="-apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="13" fill="#444">URLs in one input list.</text>

    <text x="20" y="376" font-family="-apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-weight="700" font-size="14" fill="#222">Filters</text>
    <text x="20" y="399" font-family="-apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="13" fill="#444">Dates · guests · price · beds ·</text>
    <text x="20" y="417" font-family="-apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="13" fill="#444">locale · currency.</text>
  </g>

  <line x1="380" y1="375" x2="430" y2="375" stroke="#222" stroke-width="3" marker-end="url(#arr)"/>

  <!-- STEP 2 -->
  <g transform="translate(440, 160)" filter="url(#ds)">
    <rect width="320" height="430" rx="18" fill="url(#card)" stroke="#D81B60" stroke-width="2"/>
    <text x="20" y="36" font-family="-apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-weight="800" font-size="20" fill="#222">2 · Process</text>
    <text x="20" y="62" font-family="-apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-weight="500" font-size="13" fill="#666">Pure-HTTP iOS GraphQL</text>

    <g transform="translate(20, 86)">
      <rect width="280" height="240" rx="10" fill="#1a1a1a"/>
      <circle cx="32" cy="36" r="14" fill="#FF385C"/>
      <text x="32" y="41" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-weight="800" font-size="13" fill="#1a1a1a">1</text>
      <text x="58" y="33" font-family="-apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-weight="700" font-size="13" fill="#fff">Resolve search</text>
      <text x="58" y="50" font-family="-apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="11" fill="#bdbdbd">location → /s/ query</text>
      <line x1="32" y1="58" x2="32" y2="78" stroke="#444" stroke-width="2"/>
      <circle cx="32" cy="92" r="14" fill="#FF385C"/>
      <text x="32" y="97" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-weight="800" font-size="13" fill="#1a1a1a">2</text>
      <text x="58" y="89" font-family="-apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-weight="700" font-size="13" fill="#fff">Price-band split</text>
      <text x="58" y="106" font-family="-apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="11" fill="#bdbdbd">beats the ~270-result cap</text>
      <line x1="32" y1="114" x2="32" y2="134" stroke="#444" stroke-width="2"/>
      <circle cx="32" cy="148" r="14" fill="#FF385C"/>
      <text x="32" y="153" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-weight="800" font-size="13" fill="#1a1a1a">3</text>
      <text x="58" y="145" font-family="-apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-weight="700" font-size="13" fill="#fff">Fetch listings</text>
      <text x="58" y="162" font-family="-apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="11" fill="#bdbdbd">no browser, no CF service</text>
      <line x1="32" y1="170" x2="32" y2="190" stroke="#444" stroke-width="2"/>
      <circle cx="32" cy="204" r="14" fill="#FF385C"/>
      <text x="32" y="209" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-weight="800" font-size="13" fill="#1a1a1a">4</text>
      <text x="58" y="201" font-family="-apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-weight="700" font-size="13" fill="#fff">Detail + enrich</text>
      <text x="58" y="218" font-family="-apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="11" fill="#bdbdbd">calendar · reviews · host</text>
    </g>

    <text x="20" y="352" font-family="-apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-weight="700" font-size="14" fill="#222">Captures</text>
    <text x="20" y="373" font-family="-apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="13" fill="#444">• Prices, 40+ fields, amenities, GPS</text>
    <text x="20" y="390" font-family="-apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="13" fill="#444">• Reviews + full host profiles</text>
    <text x="20" y="407" font-family="-apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="13" fill="#444">• Per-day calendar + occupancy/rev</text>
  </g>

  <line x1="770" y1="375" x2="820" y2="375" stroke="#222" stroke-width="3" marker-end="url(#arr)"/>

  <!-- STEP 3 -->
  <g transform="translate(830, 160)" filter="url(#ds)">
    <rect width="320" height="430" rx="18" fill="url(#card)" stroke="#D81B60" stroke-width="2"/>
    <text x="20" y="36" font-family="-apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-weight="800" font-size="20" fill="#222">3 · Output</text>
    <text x="20" y="62" font-family="-apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-weight="500" font-size="13" fill="#666">One flat row per listing — JSON + CSV</text>

    <g transform="translate(20, 86)">
      <rect width="280" height="320" rx="10" fill="#1a1a1a"/>
      <text x="14" y="26" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="12" fill="#e0e0e0">{</text>
      <text x="14" y="44" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="12" fill="#e0e0e0">  id: "28198214",</text>
      <text x="14" y="62" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="12" fill="#e0e0e0">  title: "Loft in Le Marais",</text>
      <text x="14" y="80" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="12" fill="#e0e0e0">  pricing_base_price: 120,</text>
      <text x="14" y="98" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="12" fill="#e0e0e0">  accommodation_bedrooms: 2,</text>
      <text x="14" y="116" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="12" fill="#e0e0e0">  review_count: 312,</text>
      <text x="14" y="134" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="12" fill="#e0e0e0">  review_overall_rating: 4.9,</text>
      <text x="14" y="152" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="12" fill="#e0e0e0">  host_is_superhost: true,</text>
      <text x="14" y="170" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="12" fill="#e0e0e0">  location_latitude: 48.86,</text>
      <text x="14" y="188" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="12" fill="#e0e0e0">  availability_calendar: [365],</text>
      <text x="14" y="206" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="12" fill="#e0e0e0">  occupancy_rate_365d: 0.72,</text>
      <text x="14" y="224" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="12" fill="#e0e0e0">  est_revenue_365d: 31500,</text>
      <text x="14" y="242" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="12" fill="#e0e0e0">  reviews: [40]</text>
      <text x="14" y="260" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="12" fill="#e0e0e0">}</text>
    </g>
  </g>

  <text x="600" y="680" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif"
        font-size="14" fill="#222" font-weight="500">Pure HTTP · no browser · JSON or CSV out · 14 languages · 20 currencies</text>
</svg>
