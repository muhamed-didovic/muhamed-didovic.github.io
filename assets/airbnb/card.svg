<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FF5A5F"/>
      <stop offset="55%" stop-color="#FF385C"/>
      <stop offset="100%" stop-color="#D81B60"/>
    </linearGradient>
    <linearGradient id="motif" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#fff0f2"/>
    </linearGradient>
    <filter id="ds" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="6" stdDeviation="10" flood-color="#000" flood-opacity="0.25"/>
    </filter>
    <filter id="dsLite" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#000" flood-opacity="0.15"/>
    </filter>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- decorative dashed circles -->
  <g opacity="0.10">
    <circle cx="1010" cy="150" r="120" fill="none" stroke="#fff" stroke-width="2" stroke-dasharray="4 8"/>
    <circle cx="1100" cy="500" r="160" fill="none" stroke="#fff" stroke-width="2" stroke-dasharray="4 8"/>
    <circle cx="120" cy="560" r="140" fill="none" stroke="#fff" stroke-width="2" stroke-dasharray="4 8"/>
  </g>

  <!-- LEFT -->
  <g transform="translate(60, 76)">
    <g>
      <rect width="320" height="28" rx="14" fill="#1a1a1a"/>
      <text x="160" y="19" text-anchor="middle"
            font-family="-apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif"
            font-weight="700" font-size="12" fill="#FF5A5F" letter-spacing="2">SHORT-TERM RENTAL INTELLIGENCE</text>
    </g>

    <text y="92" font-family="-apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif"
          font-weight="900" font-size="58" fill="#1a1a1a">Airbnb</text>
    <text y="156" font-family="-apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif"
          font-weight="900" font-size="58" fill="#1a1a1a">Scraper</text>

    <text y="196" font-family="-apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif"
          font-weight="700" font-size="18" fill="#1a1a1a">Listings · Prices · Reviews · Calendar · Revenue</text>
    <text y="220" font-family="-apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif"
          font-weight="500" font-size="14" fill="#4a0c1f">Search by location or URL — or any room / host profile.</text>

    <!-- feature chips -->
    <g transform="translate(0, 250)" filter="url(#dsLite)">
      <rect width="170" height="34" rx="17" fill="#ffffff"/>
      <circle cx="20" cy="17" r="5" fill="#E61E4D"/>
      <text x="34" y="22" font-family="-apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-weight="700" font-size="13" fill="#222">Per-day calendar</text>
    </g>
    <g transform="translate(180, 250)" filter="url(#dsLite)">
      <rect width="200" height="34" rx="17" fill="#ffffff"/>
      <circle cx="20" cy="17" r="5" fill="#E61E4D"/>
      <text x="34" y="22" font-family="-apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-weight="700" font-size="13" fill="#222">Occupancy + revenue</text>
    </g>
    <g transform="translate(0, 296)" filter="url(#dsLite)">
      <rect width="164" height="34" rx="17" fill="#ffffff"/>
      <circle cx="20" cy="17" r="5" fill="#E61E4D"/>
      <text x="34" y="22" font-family="-apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-weight="700" font-size="13" fill="#222">Reviews + hosts</text>
    </g>
    <g transform="translate(174, 296)" filter="url(#dsLite)">
      <rect width="224" height="34" rx="17" fill="#ffffff"/>
      <circle cx="20" cy="17" r="5" fill="#E61E4D"/>
      <text x="34" y="22" font-family="-apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-weight="700" font-size="13" fill="#222">14 langs · 20 currencies</text>
    </g>

    <!-- URL chip -->
    <g transform="translate(0, 360)" filter="url(#dsLite)">
      <rect width="520" height="58" rx="12" fill="#1a1a1a"/>
      <text x="22" y="36" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="18" fill="#7ec699">▸ </text>
      <text x="46" y="36" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="17" fill="#e0e0e0">airbnb.com/s/London/homes</text>
      <text x="372" y="36" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="15" fill="#FF8A8F" font-weight="700">→ 40+ fields</text>
    </g>

    <text y="450" font-family="-apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif"
          font-weight="500" font-size="14" fill="#4a0c1f">Pure HTTP · no browser · price-band split beats the ~270-result cap</text>
  </g>

  <!-- RIGHT — generic pin + house motif (NOT the Airbnb trademark) -->
  <g filter="url(#ds)" transform="translate(955, 250) scale(1.5)">
    <circle cx="0" cy="0" r="84" fill="url(#motif)"/>
    <polygon points="-34,58 34,58 0,150" fill="url(#motif)"/>
    <polygon points="0,-50 52,-6 -52,-6" fill="#FF385C"/>
    <rect x="-36" y="-6" width="72" height="52" rx="5" fill="#FF385C"/>
    <rect x="-11" y="16" width="22" height="30" rx="3" fill="#ffffff"/>
  </g>
  <!-- 5 stars -->
  <g transform="translate(852, 520)">
    <g><polygon points="32,4 38,22 58,22 42,34 48,52 32,42 16,52 22,34 6,22 26,22" fill="#fff0f2"/></g>
    <g transform="translate(50, 0)"><polygon points="32,4 38,22 58,22 42,34 48,52 32,42 16,52 22,34 6,22 26,22" fill="#fff0f2"/></g>
    <g transform="translate(100, 0)"><polygon points="32,4 38,22 58,22 42,34 48,52 32,42 16,52 22,34 6,22 26,22" fill="#fff0f2"/></g>
    <g transform="translate(150, 0)"><polygon points="32,4 38,22 58,22 42,34 48,52 32,42 16,52 22,34 6,22 26,22" fill="#fff0f2"/></g>
    <g transform="translate(200, 0)"><polygon points="32,4 38,22 58,22 42,34 48,52 32,42 16,52 22,34 6,22 26,22" fill="#fff0f2"/></g>
  </g>

  <text x="60" y="600" font-family="-apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif"
        font-weight="700" font-size="12" fill="#1a1a1a" opacity="0.65" letter-spacing="2">APIFY ACTOR</text>
</svg>
