<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FF5A5F"/>
      <stop offset="55%" stop-color="#FF385C"/>
      <stop offset="100%" stop-color="#E61E4D"/>
    </linearGradient>
    <linearGradient id="motifGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#fff0f2"/>
    </linearGradient>
    <linearGradient id="starGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fff0f2"/>
      <stop offset="100%" stop-color="#ffd0d8"/>
    </linearGradient>
    <filter id="dropShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="3" stdDeviation="6" flood-color="#000000" flood-opacity="0.3"/>
    </filter>
  </defs>

  <!-- Rounded card -->
  <rect width="512" height="512" rx="64" fill="url(#bgGrad)"/>
  <circle cx="256" cy="168" r="220" fill="#ffffff" opacity="0.10"/>

  <!-- Generic location-pin + house motif (NOT the Airbnb trademark) -->
  <g filter="url(#dropShadow)" transform="translate(256, 190)">
    <circle cx="0" cy="0" r="84" fill="url(#motifGrad)"/>
    <polygon points="-34,58 34,58 0,150" fill="url(#motifGrad)"/>
    <polygon points="0,-50 52,-6 -52,-6" fill="#FF385C"/>
    <rect x="-36" y="-6" width="72" height="52" rx="5" fill="#FF385C"/>
    <rect x="-11" y="16" width="22" height="30" rx="3" fill="#ffffff"/>
  </g>

  <!-- 5 stars (reviews) -->
  <g filter="url(#dropShadow)" transform="translate(96, 408)">
    <g transform="translate(0,0)"><polygon points="32,4 38,22 58,22 42,34 48,52 32,42 16,52 22,34 6,22 26,22" fill="url(#starGrad)"/></g>
    <g transform="translate(72,0)"><polygon points="32,4 38,22 58,22 42,34 48,52 32,42 16,52 22,34 6,22 26,22" fill="url(#starGrad)"/></g>
    <g transform="translate(144,0)"><polygon points="32,4 38,22 58,22 42,34 48,52 32,42 16,52 22,34 6,22 26,22" fill="url(#starGrad)"/></g>
    <g transform="translate(216,0)"><polygon points="32,4 38,22 58,22 42,34 48,52 32,42 16,52 22,34 6,22 26,22" fill="url(#starGrad)"/></g>
    <g transform="translate(288,0)"><polygon points="32,4 38,22 58,22 42,34 48,52 32,42 16,52 22,34 6,22 26,22" fill="url(#starGrad)"/></g>
  </g>
</svg>
