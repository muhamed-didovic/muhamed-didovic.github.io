<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 720" width="1200" height="720">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0a4a5e"/>
      <stop offset="100%" stop-color="#083344"/>
    </linearGradient>
    <linearGradient id="card" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#f4fbfd"/>
    </linearGradient>
    <linearGradient id="redGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#e03c3c"/>
      <stop offset="100%" stop-color="#cc0000"/>
    </linearGradient>
    <filter id="ds" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#000" flood-opacity="0.35"/>
    </filter>
    <marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="9" markerHeight="9" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#22d3ee"/>
    </marker>
  </defs>

  <rect width="1200" height="720" fill="url(#bg)"/>

  <!-- decorative arcs -->
  <g opacity="0.07">
    <circle cx="1100" cy="60" r="180" fill="none" stroke="#22d3ee" stroke-width="2" stroke-dasharray="6 8"/>
    <circle cx="100"  cy="660" r="180" fill="none" stroke="#22d3ee" stroke-width="2" stroke-dasharray="6 8"/>
  </g>

  <!-- Title -->
  <text x="600" y="62" text-anchor="middle"
        font-family="-apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif"
        font-weight="800" font-size="34" fill="#ffffff">How the Dice.com Jobs Scraper works</text>
  <text x="600" y="96" text-anchor="middle"
        font-family="-apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif"
        font-weight="500" font-size="17" fill="#22d3ee">Search URL or keyword filters → full job-detail rows → optional employer emails + payment leads</text>

  <!-- STEP 1 — Input -->
  <g transform="translate(50, 150)" filter="url(#ds)">
    <rect width="320" height="450" rx="18" fill="url(#card)" stroke="#cc0000" stroke-width="2"/>
    <text x="20" y="36" font-family="-apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif"
          font-weight="800" font-size="20" fill="#083344">1 · Input</text>
    <text x="20" y="62" font-family="-apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif"
          font-weight="500" font-size="13" fill="#4a6b78">Search URLs or keyword + filters</text>

    <g transform="translate(20, 84)">
      <rect width="280" height="36" rx="8" fill="#fdeeee" stroke="#cc0000" stroke-width="1"/>
      <text x="14" y="23" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace"
            font-size="11" fill="#083344">dice.com/jobs?q=software+eng…</text>
    </g>
    <g transform="translate(20, 128)">
      <rect width="280" height="36" rx="8" fill="#fdeeee" stroke="#cc0000" stroke-width="1"/>
      <text x="14" y="23" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace"
            font-size="11" fill="#083344">dice.com/job-detail/{uuid}</text>
    </g>
    <g transform="translate(20, 172)">
      <rect width="280" height="36" rx="8" fill="#fdeeee" stroke="#cc0000" stroke-width="1"/>
      <text x="14" y="23" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace"
            font-size="11" fill="#083344">keyword: "data engineer"</text>
    </g>

    <text x="20" y="244" font-family="-apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif"
          font-weight="700" font-size="14" fill="#083344">Filter builder (no URL needed)</text>
    <g transform="translate(20, 258)">
      <rect width="132" height="30" rx="15" fill="#e8f7fb" stroke="#0e7490" stroke-width="1"/>
      <text x="66" y="19" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, Arial, sans-serif"
            font-weight="700" font-size="11" fill="#0e7490">Remote / Hybrid</text>
    </g>
    <g transform="translate(160, 258)">
      <rect width="140" height="30" rx="15" fill="#e8f7fb" stroke="#0e7490" stroke-width="1"/>
      <text x="70" y="19" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, Arial, sans-serif"
            font-weight="700" font-size="11" fill="#0e7490">Employment type</text>
    </g>
    <g transform="translate(20, 296)">
      <rect width="132" height="30" rx="15" fill="#e8f7fb" stroke="#0e7490" stroke-width="1"/>
      <text x="66" y="19" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, Arial, sans-serif"
            font-weight="700" font-size="11" fill="#0e7490">Posted date</text>
    </g>
    <g transform="translate(160, 296)">
      <rect width="140" height="30" rx="15" fill="#e8f7fb" stroke="#0e7490" stroke-width="1"/>
      <text x="70" y="19" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, Arial, sans-serif"
            font-weight="700" font-size="11" fill="#0e7490">Visa sponsorship</text>
    </g>
    <g transform="translate(20, 334)">
      <rect width="132" height="30" rx="15" fill="#e8f7fb" stroke="#0e7490" stroke-width="1"/>
      <text x="66" y="19" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, Arial, sans-serif"
            font-weight="700" font-size="11" fill="#0e7490">Easy Apply</text>
    </g>
    <g transform="translate(160, 334)">
      <rect width="140" height="30" rx="15" fill="#e8f7fb" stroke="#0e7490" stroke-width="1"/>
      <text x="70" y="19" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, Arial, sans-serif"
            font-weight="700" font-size="11" fill="#0e7490">Location + radius</text>
    </g>

    <text x="20" y="404" font-family="-apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif"
          font-weight="700" font-size="14" fill="#083344">URLs win when both set:</text>
    <text x="20" y="426" font-family="-apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif"
          font-size="13" fill="#4a6b78">startUrls override the keyword</text>
    <text x="20" y="444" font-family="-apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif"
          font-size="13" fill="#4a6b78">and filter fields for that run.</text>
  </g>

  <!-- ARROW 1 → 2 -->
  <line x1="380" y1="370" x2="430" y2="370" stroke="#22d3ee" stroke-width="3" marker-end="url(#arr)"/>

  <!-- STEP 2 — Fetch + Parse -->
  <g transform="translate(440, 150)" filter="url(#ds)">
    <rect width="320" height="450" rx="18" fill="url(#card)" stroke="#cc0000" stroke-width="2"/>
    <text x="20" y="36" font-family="-apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif"
          font-weight="800" font-size="20" fill="#083344">2 · Fetch &amp; Enrich</text>
    <text x="20" y="62" font-family="-apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif"
          font-weight="500" font-size="13" fill="#4a6b78">Pure HTTP · concurrent · no browser</text>

    <g transform="translate(20, 84)">
      <rect width="280" height="44" rx="10" fill="#041e28"/>
      <text x="14" y="20" font-family="-apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif"
            font-weight="800" font-size="13" fill="#ffffff">Search pages → job list</text>
      <text x="14" y="35" font-family="-apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif"
            font-weight="500" font-size="11" fill="#a5d8e6">Auto-pagination until maxItems</text>
    </g>
    <g transform="translate(20, 138)">
      <rect width="280" height="44" rx="10" fill="#041e28"/>
      <text x="14" y="20" font-family="-apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif"
            font-weight="800" font-size="13" fill="#ffffff">Detail API per job</text>
      <text x="14" y="35" font-family="-apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif"
            font-weight="500" font-size="11" fill="#a5d8e6">Full JSON — richer than the HTML page</text>
    </g>

    <!-- Monitoring highlight -->
    <g transform="translate(20, 196)">
      <rect width="280" height="52" rx="10" fill="#e8f5e8" stroke="#2e7d32" stroke-width="1.5"/>
      <circle cx="20" cy="26" r="9" fill="#2e7d32"/>
      <text x="20" y="31" text-anchor="middle"
            font-family="-apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif"
            font-weight="900" font-size="11" fill="#ffffff">✓</text>
      <text x="38" y="22" font-family="-apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif"
            font-weight="800" font-size="12" fill="#1a5a1a">Monitoring mode (opt-in)</text>
      <text x="38" y="39" font-family="-apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif"
            font-size="11" fill="#1a5a1a">Reruns emit only never-seen jobs</text>
    </g>

    <text x="20" y="286" font-family="-apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif"
          font-weight="700" font-size="14" fill="#083344">Opt-in employer enrichment:</text>
    <g transform="translate(20, 300)">
      <rect width="280" height="34" rx="8" fill="#fdeeee"/>
      <circle cx="20" cy="17" r="5" fill="url(#redGrad)"/>
      <text x="34" y="22" font-family="-apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif"
            font-weight="700" font-size="12" fill="#083344">Website discovery + contact email</text>
    </g>
    <g transform="translate(20, 342)">
      <rect width="280" height="34" rx="8" fill="#fdeeee"/>
      <circle cx="20" cy="17" r="5" fill="url(#redGrad)"/>
      <text x="34" y="22" font-family="-apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif"
            font-weight="700" font-size="12" fill="#083344">Payment-stack scan (Stripe, Shopify…)</text>
    </g>

    <text x="20" y="410" font-family="-apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif"
          font-size="13" fill="#4a6b78">Enrichment reuses pages already</text>
    <text x="20" y="428" font-family="-apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif"
          font-size="13" fill="#4a6b78">fetched for email discovery —</text>
    <text x="20" y="446" font-family="-apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif"
          font-weight="700" font-size="13" fill="#cc0000">best-effort, never blocks a row.</text>
  </g>

  <!-- ARROW 2 → 3 -->
  <line x1="770" y1="370" x2="820" y2="370" stroke="#22d3ee" stroke-width="3" marker-end="url(#arr)"/>

  <!-- STEP 3 — Emit -->
  <g transform="translate(830, 150)" filter="url(#ds)">
    <rect width="320" height="450" rx="18" fill="url(#card)" stroke="#cc0000" stroke-width="2"/>
    <text x="20" y="36" font-family="-apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif"
          font-weight="800" font-size="20" fill="#083344">3 · Emit job rows</text>
    <text x="20" y="62" font-family="-apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif"
          font-weight="500" font-size="13" fill="#4a6b78">One dataset row per job posting</text>

    <g transform="translate(20, 84)">
      <rect width="280" height="150" rx="10" fill="#041e28"/>
      <text x="14" y="24" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace"
            font-size="10" fill="#7ec699">{ "position": { "title", loc },</text>
      <text x="14" y="42" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace"
            font-size="10" fill="#e0e0e0">  "payRate": "USD70 - USD88",</text>
      <text x="14" y="60" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace"
            font-size="10" fill="#e0e0e0">  "skills": [...], "remote",</text>
      <text x="14" y="78" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace"
            font-size="10" fill="#e0e0e0">  "company": { profile… },</text>
      <text x="14" y="96" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace"
            font-size="10" fill="#e0e0e0">  "apply": { easyApply, count },</text>
      <text x="14" y="114" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace"
            font-size="10" fill="#22d3ee">  "contactEmail": "hr@acme.io",</text>
      <text x="14" y="132" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace"
            font-size="10" fill="#22d3ee">  "takesPayments": true, … }</text>
    </g>

    <text x="20" y="272" font-family="-apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif"
          font-weight="700" font-size="14" fill="#083344">Every row includes:</text>
    <g transform="translate(20, 286)">
      <rect width="280" height="34" rx="8" fill="#fdeeee"/>
      <circle cx="20" cy="17" r="5" fill="url(#redGrad)"/>
      <text x="34" y="22" font-family="-apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif"
            font-weight="700" font-size="12" fill="#083344">Salary + employment types</text>
    </g>
    <g transform="translate(20, 328)">
      <rect width="280" height="34" rx="8" fill="#fdeeee"/>
      <circle cx="20" cy="17" r="5" fill="url(#redGrad)"/>
      <text x="34" y="22" font-family="-apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif"
            font-weight="700" font-size="12" fill="#083344">Full HTML description + skills</text>
    </g>
    <g transform="translate(20, 370)">
      <rect width="280" height="34" rx="8" fill="#fdeeee"/>
      <circle cx="20" cy="17" r="5" fill="url(#redGrad)"/>
      <text x="34" y="22" font-family="-apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif"
            font-weight="700" font-size="12" fill="#083344">Recruiter vs direct employer</text>
    </g>

    <text x="20" y="440" font-family="-apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif"
          font-weight="700" font-size="13" fill="#cc0000">JSON + CSV · self-contained rows</text>
  </g>

  <!-- Footer summary -->
  <g transform="translate(60, 646)">
    <text font-family="-apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif"
          font-weight="700" font-size="14" fill="#ffffff">What no other Dice scraper ships:</text>
    <text y="22" font-family="-apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif"
          font-size="13" fill="#a5d8e6">employer contact emails · payment-stack lead qualification · only-new-jobs monitoring · applicant counts when Dice exposes them.</text>
  </g>

  <text x="1140" y="700" text-anchor="end"
        font-family="-apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif"
        font-weight="700" font-size="12" fill="#a5d8e6" opacity="0.6" letter-spacing="2">APIFY ACTOR · MEMO23</text>
</svg>
