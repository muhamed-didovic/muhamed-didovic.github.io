<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#322A52"/>
      <stop offset="100%" stop-color="#1B152A"/>
    </linearGradient>
    <linearGradient id="green" x1="0" y1="1" x2="1" y2="0">
      <stop offset="0%" stop-color="#22C55E"/>
      <stop offset="100%" stop-color="#A3E635"/>
    </linearGradient>
    <filter id="ds" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="6" stdDeviation="10" flood-color="#000000" flood-opacity="0.35"/>
    </filter>
  </defs>

  <!-- card -->
  <rect width="512" height="512" rx="104" fill="url(#bg)"/>
  <!-- subtle dot grid -->
  <g fill="#FFFFFF" opacity="0.05">
    <circle cx="96" cy="96" r="5"/><circle cx="176" cy="96" r="5"/><circle cx="256" cy="96" r="5"/><circle cx="336" cy="96" r="5"/><circle cx="416" cy="96" r="5"/>
    <circle cx="96" cy="416" r="5"/><circle cx="176" cy="416" r="5"/><circle cx="416" cy="176" r="5"/>
  </g>

  <!-- ascending bars (growth / financials) -->
  <g filter="url(#ds)">
    <rect x="150" y="300" width="48" height="86" rx="12" fill="#A8A7B7" opacity="0.55"/>
    <rect x="232" y="252" width="48" height="134" rx="12" fill="#A8A7B7" opacity="0.8"/>
    <rect x="314" y="196" width="48" height="190" rx="12" fill="url(#green)"/>
  </g>

  <!-- upward arrow "A" / acquisition trend -->
  <g filter="url(#ds)" stroke="url(#green)" stroke-width="26" stroke-linecap="round" stroke-linejoin="round" fill="none">
    <path d="M150 250 L256 150 L362 250"/>
  </g>
  <circle cx="362" cy="250" r="20" fill="#A3E635" filter="url(#ds)"/>
</svg>
