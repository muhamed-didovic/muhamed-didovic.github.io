<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 720" width="1200" height="720">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#322A52"/>
      <stop offset="100%" stop-color="#16121F"/>
    </linearGradient>
    <linearGradient id="green" x1="0" y1="1" x2="1" y2="0">
      <stop offset="0%" stop-color="#22C55E"/>
      <stop offset="100%" stop-color="#A3E635"/>
    </linearGradient>
    <filter id="ds" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="6" stdDeviation="12" flood-color="#000000" flood-opacity="0.4"/>
    </filter>
  </defs>

  <rect width="1200" height="720" fill="url(#bg)"/>

  <text x="600" y="92" text-anchor="middle" font-family="-apple-system, Segoe UI, Roboto, sans-serif" font-size="40" font-weight="800" fill="#FFFFFF">How it works</text>
  <text x="600" y="134" text-anchor="middle" font-family="-apple-system, Segoe UI, Roboto, sans-serif" font-size="22" font-weight="500" fill="#A8A7B7">Pure HTTP — logs in, reads the API, returns clean rows. No browser.</text>

  <!-- arrows -->
  <g stroke="url(#green)" stroke-width="5" fill="none" stroke-linecap="round">
    <path d="M392 400 L432 400"/><path d="M416 386 L432 400 L416 414"/>
    <path d="M768 400 L808 400"/><path d="M792 386 L808 400 L792 414"/>
  </g>

  <!-- COL 1 — INPUT -->
  <g filter="url(#ds)">
    <rect x="64" y="220" width="328" height="360" rx="26" fill="#211B36" stroke="#3D3460" stroke-width="2"/>
  </g>
  <g font-family="-apple-system, Segoe UI, Roboto, sans-serif">
    <circle cx="108" cy="276" r="26" fill="#A3E635" opacity="0.15"/>
    <text x="108" y="285" text-anchor="middle" font-size="26" font-weight="800" fill="#A3E635">1</text>
    <text x="152" y="270" font-size="26" font-weight="800" fill="#FFFFFF">Input</text>
    <text x="152" y="300" font-size="17" font-weight="500" fill="#A8A7B7">what to scrape</text>

    <g font-size="18" font-weight="600" fill="#D7D5E4">
      <text x="96" y="364">▸ Crawl the marketplace</text>
      <text x="96" y="402">▸ or paste listing URLs</text>
    </g>
    <g font-size="16" font-weight="600">
      <rect x="92"  y="430" width="120" height="40" rx="20" fill="#2A2350"/><text x="112" y="456" fill="#A3E635">category</text>
      <rect x="224" y="430" width="92"  height="40" rx="20" fill="#2A2350"/><text x="244" y="456" fill="#A3E635">price</text>
      <rect x="92"  y="482" width="112" height="40" rx="20" fill="#2A2350"/><text x="112" y="508" fill="#A3E635">revenue</text>
      <rect x="216" y="482" width="100" height="40" rx="20" fill="#2A2350"/><text x="236" y="508" fill="#A3E635">profit</text>
    </g>
  </g>

  <!-- COL 2 — FETCH -->
  <g filter="url(#ds)">
    <rect x="436" y="220" width="328" height="360" rx="26" fill="#211B36" stroke="#3D3460" stroke-width="2"/>
  </g>
  <g font-family="-apple-system, Segoe UI, Roboto, sans-serif">
    <circle cx="480" cy="276" r="26" fill="#A3E635" opacity="0.15"/>
    <text x="480" y="285" text-anchor="middle" font-size="26" font-weight="800" fill="#A3E635">2</text>
    <text x="524" y="270" font-size="26" font-weight="800" fill="#FFFFFF">Authenticate</text>
    <text x="524" y="300" font-size="17" font-weight="500" fill="#A8A7B7">&amp; fetch</text>

    <g font-size="18" font-weight="600" fill="#D7D5E4">
      <text x="468" y="356">▸ Firebase login</text>
      <text x="468" y="394">▸ Marketplace search API</text>
      <text x="468" y="432">▸ Firestore detail doc</text>
      <text x="468" y="470">▸ Paced + auto-retry</text>
    </g>
    <rect x="468" y="500" width="264" height="44" rx="12" fill="#16121F"/>
    <text x="484" y="528" font-family="ui-monospace, Menlo, monospace" font-size="15" fill="#6EE7A0">200 OK · gated data</text>
  </g>

  <!-- COL 3 — EMIT -->
  <g filter="url(#ds)">
    <rect x="808" y="220" width="328" height="360" rx="26" fill="#211B36" stroke="#3D3460" stroke-width="2"/>
  </g>
  <g font-family="-apple-system, Segoe UI, Roboto, sans-serif">
    <circle cx="852" cy="276" r="26" fill="#A3E635" opacity="0.15"/>
    <text x="852" y="285" text-anchor="middle" font-size="26" font-weight="800" fill="#A3E635">3</text>
    <text x="896" y="270" font-size="26" font-weight="800" fill="#FFFFFF">Emit</text>
    <text x="896" y="300" font-size="17" font-weight="500" fill="#A8A7B7">42 clean fields</text>

    <g font-size="16" font-weight="600">
      <rect x="840" y="338" width="150" height="40" rx="20" fill="#2A2350"/><text x="860" y="364" fill="#A3E635">financials</text>
      <rect x="840" y="390" width="160" height="40" rx="20" fill="#2A2350"/><text x="860" y="416" fill="#A3E635">ARR · churn</text>
      <rect x="840" y="442" width="180" height="40" rx="20" fill="#2A2350"/><text x="860" y="468" fill="#A3E635">tech · competitors</text>
    </g>
    <rect x="840" y="500" width="150" height="44" rx="12" fill="url(#green)"/>
    <text x="915" y="528" text-anchor="middle" font-family="-apple-system, Segoe UI, Roboto, sans-serif" font-size="17" font-weight="800" fill="#16121F">JSON / CSV</text>
  </g>

  <text x="600" y="648" text-anchor="middle" font-family="-apple-system, Segoe UI, Roboto, sans-serif" font-size="18" font-weight="500" fill="#6E6B85">~1,300+ verified startup listings · the gated data public scrapers can't reach</text>
</svg>
