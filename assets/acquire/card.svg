<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#322A52"/>
      <stop offset="100%" stop-color="#16121F"/>
    </linearGradient>
    <linearGradient id="green" x1="0" y1="1" x2="1" y2="0">
      <stop offset="0%" stop-color="#22C55E"/>
      <stop offset="100%" stop-color="#A3E635"/>
    </linearGradient>
    <filter id="ds" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="6" stdDeviation="14" flood-color="#000000" flood-opacity="0.4"/>
    </filter>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>
  <g fill="#FFFFFF" opacity="0.045">
    <circle cx="60" cy="60" r="5"/><circle cx="140" cy="60" r="5"/><circle cx="220" cy="60" r="5"/>
    <circle cx="60" cy="570" r="5"/><circle cx="1140" cy="60" r="5"/><circle cx="1140" cy="570" r="5"/>
  </g>

  <!-- LEFT column -->
  <g font-family="-apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif">
    <!-- eyebrow -->
    <rect x="72" y="86" width="186" height="40" rx="20" fill="#A3E635" opacity="0.15"/>
    <text x="92" y="113" font-size="20" font-weight="700" fill="#A3E635" letter-spacing="2">APIFY ACTOR</text>

    <!-- title -->
    <text x="70" y="208" font-size="74" font-weight="800" fill="#FFFFFF">Acquire.com</text>
    <text x="70" y="288" font-size="74" font-weight="800" fill="#FFFFFF">Scraper</text>

    <!-- subtitle -->
    <text x="72" y="346" font-size="27" font-weight="500" fill="#C9C7D6">The full logged-in dataset —</text>
    <text x="72" y="382" font-size="27" font-weight="500" fill="#C9C7D6">financials, metrics &amp; details</text>

    <!-- feature chips -->
    <g font-size="20" font-weight="600">
      <rect x="72"  y="430" width="150" height="46" rx="23" fill="#251E3E" stroke="#3D3460"/>
      <text x="98"  y="459" fill="#A3E635">TTM P&amp;L</text>
      <rect x="236" y="430" width="104" height="46" rx="23" fill="#251E3E" stroke="#3D3460"/>
      <text x="262" y="459" fill="#A3E635">ARR</text>
      <rect x="354" y="430" width="120" height="46" rx="23" fill="#251E3E" stroke="#3D3460"/>
      <text x="380" y="459" fill="#A3E635">churn</text>
      <rect x="488" y="430" width="160" height="46" rx="23" fill="#251E3E" stroke="#3D3460"/>
      <text x="514" y="459" fill="#A3E635">multiples</text>
    </g>

    <!-- credibility line -->
    <text x="72" y="540" font-size="21" font-weight="500" fill="#A8A7B7">Pure HTTP · logs in · JSON / CSV · 42 fields per listing</text>
  </g>

  <!-- RIGHT column: listing-card mockup -->
  <g filter="url(#ds)" transform="translate(720,150)">
    <rect width="408" height="330" rx="28" fill="#211B36"/>
    <rect width="408" height="330" rx="28" fill="none" stroke="#3D3460" stroke-width="2"/>

    <!-- verified pill -->
    <rect x="28" y="28" width="118" height="34" rx="17" fill="#22C55E" opacity="0.18"/>
    <circle cx="48" cy="45" r="7" fill="#22C55E"/>
    <text x="62" y="51" font-family="-apple-system, Segoe UI, Roboto, sans-serif" font-size="16" font-weight="700" fill="#A3E635">VERIFIED</text>
    <text x="300" y="51" font-family="-apple-system, Segoe UI, Roboto, sans-serif" font-size="16" font-weight="600" fill="#8C8AA3">SaaS</text>

    <!-- asking price -->
    <text x="28" y="108" font-family="-apple-system, Segoe UI, Roboto, sans-serif" font-size="15" font-weight="600" fill="#8C8AA3" letter-spacing="1">ASKING PRICE</text>
    <text x="28" y="152" font-family="-apple-system, Segoe UI, Roboto, sans-serif" font-size="46" font-weight="800" fill="#FFFFFF">$1.35M</text>

    <!-- metric grid -->
    <g font-family="-apple-system, Segoe UI, Roboto, sans-serif">
      <text x="28"  y="196" font-size="14" font-weight="600" fill="#8C8AA3">TTM REVENUE</text>
      <text x="28"  y="224" font-size="26" font-weight="800" fill="#A3E635">$2.1M</text>
      <text x="170" y="196" font-size="14" font-weight="600" fill="#8C8AA3">TTM PROFIT</text>
      <text x="170" y="224" font-size="26" font-weight="800" fill="#A3E635">$413k</text>
      <text x="28"  y="270" font-size="14" font-weight="600" fill="#8C8AA3">ARR</text>
      <text x="28"  y="298" font-size="26" font-weight="800" fill="#FFFFFF">$1.9M</text>
      <text x="170" y="270" font-size="14" font-weight="600" fill="#8C8AA3">CHURN</text>
      <text x="170" y="298" font-size="26" font-weight="800" fill="#FFFFFF">3%</text>
    </g>

    <!-- sparkline -->
    <g transform="translate(280,250)" stroke="url(#green)" stroke-width="5" fill="none" stroke-linecap="round" stroke-linejoin="round">
      <path d="M0 48 L26 36 L52 40 L78 18 L104 6"/>
    </g>
    <circle cx="384" cy="256" r="6" fill="#A3E635"/>
  </g>
</svg>
